<!doctype html>
<html>
  <head>
    <link rel="stylesheet" type="text/css" href="https://fonts.googleapis.com/css?family=VT323">
    <link rel="stylesheet" type="text/css"  href="css/style.css">
  </head>
  <body>
    <div class="calculator">
      <div class="output">
        <input type="text">
      </div>
      <div class="row-one">
        <button class="number seven">7</button>
        <button class="number eight">8</button>
        <button class="number nine">9</button>
        <button class="divide">&#247;</button>
      </div>
      <div class="row-two">
        <button class="number four">4</button>
        <button class="number five">5</button>
        <button class="number six">6</button>
        <button class="multiply">x</button>
      </div>
      <div class="row-three">
        <button class="on">ON/C</button>
        <button class="radical">&radic;</button>
        <button class="number one">1</button>
        <button class="number two">2</button>
        <button class="number three">3</button>
        <button class="subtract">-</button>
      </div>
      <div class="row-four">
        <button class="ce">CE</button>
        <button class="modulus">%</button>
        <button class="number zero">0</button>
        <button class="point">.</button>
        <button class="equals">=</button>
        <button class="add">+</button>
      </div>
    </div>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/jquery/2.1.3/jquery.min.js"></script>
    <script src="js/app.js"></script>
  </body>
</html>
